# OfficeClaw Configuration
# Copy this file to config.yaml and customize as needed.

# WhatsApp Integration
# On first run, scan the QR code with your WhatsApp mobile app to link.
whatsapp:
  # Path to SQLite database for WhatsApp session storage
  database_path: "whatsapp.db"
  # Trigger prefix - messages starting with this will be processed by OfficeClaw agent
  trigger_prefix: "OC:"
  # Trigger prefix for direct Claude CLI agent mode (bypasses OfficeClaw agent)
  # Claude CLI runs with full autonomy and auto-approval of all tool requests
  claude_trigger: "OCC:"
  # Working folder for Claude CLI agent (used with OCC: trigger)
  # Claude will execute with this as its working directory
  claude_working_folder: "C:\\Projects\\MyRepo"
  # Working folder for Copilot CLI agent (defaults to claude_working_folder if empty)
  copilot_working_folder: ""
  # Keyword to reset the Claude CLI session and clear conversation context
  # Send "OCC: reset" to restart the session (case-insensitive)
  # The session persists across messages, maintaining context until reset
  claude_session_reset_keyword: "reset"
  # Default task when none specified in message
  default_task: "assist"
  # Unique name for this machine (used for targeted messaging)
  # When a message includes <machine_name>: after the trigger prefix,
  # only the machine with a matching name will respond.
  machine_name: "office1"

# LLM provider configuration
llm:
  # Primary provider: "anthropic", "azure", "openai"
  provider: "anthropic"

  # Anthropic (Claude) configuration
  # Uses the Claude Code CLI with organization SSO authentication.
  # No API key required - the CLI must be pre-authenticated (run `claude` once to sign in).
  anthropic:
    model: "claude-sonnet-4-20250514"
    max_tokens: 8192
    # Path to Claude CLI executable (auto-detected if empty)
    cli_path: ""

  # Azure OpenAI configuration
  azure:
    endpoint: ""           # Or use AZURE_OPENAI_ENDPOINT env var
    api_key: ""            # Or use AZURE_OPENAI_API_KEY env var
    api_version: "2024-02-01"

  # OpenAI direct configuration
  openai:
    api_key: ""  # Or use OPENAI_API_KEY env var
    model: "gpt-4"
    max_tokens: 8192

  # GitHub Copilot CLI configuration
  # Uses the Copilot CLI with GitHub OAuth authentication.
  # No API key required - the CLI must be pre-authenticated (run `copilot login`).
  copilot:
    model: ""         # Empty = Copilot default (e.g., gpt-5.4)
    max_tokens: 8192
    cli_path: ""      # Auto-detected if empty

  # Request settings
  temperature: 0.1
  request_timeout_seconds: 180

# Tools configuration
tools:
  # Local file access tool
  file_access:
    enabled: true
    # Allowed root directories for read-only file access
    allowed_paths:
      - "C:\\Users\\you\\Documents"
      - "C:\\Projects"
    max_file_size_mb: 10

  # WhatsApp reply tool (auto-configured)
  messaging:
    enabled: true

  # Task execution tool
  task_execution:
    enabled: true

  # VPN management tool
  # Connects using rasdial with cached Entra ID / SSO tokens (silent auth).
  # When the token expires, manual sign-in is required on the VM.
  vpn:
    enabled: true
    # VPN connection names as configured in Windows (first one is the default)
    vpn_names:
      - "MyVPN-1"
      - "MyVPN-2"
    # Timeout for connection attempts (seconds)
    connect_timeout_seconds: 30
    # Keep-alive: periodically check and reconnect if VPN drops
    keep_alive_enabled: true
    keep_alive_minutes: 30
    # Optional: UNC path to verify internal network access after connecting
    # verify_path: "\\\\internal-share\\folder"

  # Memory service integration
  # Provides long-term memory via LLMCrawl's memory service (deployed separately)
  # If service_url is empty or service is unreachable, memory features are disabled.
  #
  # Deployment (requires Docker):
  #   cd C:\src\github\LLMCrawl\memory-service
  #   $env:MEMORY_DATA_PATH = "C:\Users\you\OfficeClaw\memory"  # REQUIRED
  #   docker compose up -d
  #
  # See LLMCrawl\docs\MEMORY.md for full API documentation
  memory:
    # Memory service URL (leave empty to disable memory features)
    service_url: "http://localhost:8007"
    # Context percentage to trigger automatic distillation (0.0-1.0)
    # When context reaches this threshold, summary and facts are extracted
    flush_threshold: 0.8
    # Maximum context tokens for flush detection
    max_context_tokens: 100000

# Task definitions
# Only predefined tasks listed here can be executed by the agent.
# The agent will refuse to run any task not in this list.
tasks:
  # Built-in tasks (LLM-driven, no command)
  assist:
    description: "General assistance - analyze message and respond helpfully"
    timeout_seconds: 300

  summarize_files:
    description: "Summarize files in a directory"
    timeout_seconds: 120

  # Predefined command tasks
  # The agent matches user requests to tasks by description, so use clear descriptions.
  # Example:
  #   User says: "set up a build" → agent matches "setupbuild" by description
  setupbuild:
    description: "Set up a new OS repository build on the machine"
    command: "c:\\tools\\setup-build.ps1 -branch main"
    timeout_seconds: 600

  # More examples:
  # check_disk:
  #   description: "Check disk space and usage on all drives"
  #   command: "Get-PSDrive -PSProvider FileSystem | Format-Table Name,Used,Free -AutoSize"
  #   timeout_seconds: 60
  #
  # restart_service:
  #   description: "Restart a Windows service"
  #   command: "Restart-Service -Name MyService -Force"
  #   timeout_seconds: 120
  #   schedule: "0 3 * * *"  # cron format, optional

# Telemetry / Observability
telemetry:
  enabled: true
  # Prometheus metrics endpoint
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"
  # OpenTelemetry
  otel:
    enabled: true
    service_name: "officeclaw"
    # OTLP exporter endpoint (optional, for external collectors)
    # otlp_endpoint: "http://localhost:4317"

# Logging
logging:
  level: "info"  # debug, info, warn, error
  # Log file path (in addition to console)
  file: "officeclaw.log"
  max_size_mb: 50
  max_backups: 3
